name: Read-only upstream watcher

on:
  schedule:
    - cron: "17 14 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: upstream-watcher
  cancel-in-progress: true

jobs:
  inspect:
    name: Inspect upstream metadata
    runs-on: macos-14
    timeout-minutes: 10
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install pnpm
        uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4
        with:
          version: 10.33.1
          run_install: false

      - name: Install Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22.15.0
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Collect read-only upstream report
        env:
          GITHUB_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          pnpm build
          node scripts/check-upstreams.mjs > upstream-report.json
          node --input-type=module <<'NODE'
          import { readFile, appendFile } from "node:fs/promises";
          const report = JSON.parse(await readFile("upstream-report.json", "utf8"));
          const rows = report.changes.length === 0
            ? "| none | — | — | — |"
            : report.changes.map((entry) =>
                `| ${entry.component} | ${entry.channel ?? "—"} | ${entry.current} | ${entry.candidate} |`
              ).join("\n");
          const summary = [
            "# Claudex upstream watcher",
            "",
            `- Checked: ${report.checkedAt}`,
            `- Fingerprint: \`${report.fingerprint}\``,
            `- Recommendation: \`${report.recommendation}\``,
            "",
            "| Component | Channel | Certified | Observed |",
            "| --- | --- | --- | --- |",
            rows,
            "",
            "> Discovery only. This workflow does not certify, edit, merge, tag, sign, publish, or touch a Claudex profile."
          ].join("\n");
          await appendFile(process.env.GITHUB_STEP_SUMMARY, `${summary}\n`);
          if (report.changes.length > 0) {
            console.log(`::warning title=Claudex upstream candidates observed::${report.recommendation} (${report.fingerprint})`);
          }
          NODE

      - name: Retain normalized report
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: upstream-report
          path: upstream-report.json
          if-no-files-found: error
          retention-days: 30
